name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build llvm-dev llvm-runtime clang lld

      - name: Resolve LLVM_DIR
        run: echo "LLVM_DIR=$(llvm-config --cmakedir)" >> "$GITHUB_ENV"

      - name: Build, test, and package (Linux)
        run: ./tools/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: lune-linux-x64
          path: dist/lune-linux-x64.tar.gz

  release:
    needs: [build-linux]
    runs-on: ubuntu-24.04
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: lune-linux-x64
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lune-linux-x64.tar.gz
          generate_release_notes: true
