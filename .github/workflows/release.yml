name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build llvm-20-dev clang-20 lld-20

      - name: Build, test, and package (Linux)
        run: ./tools/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: lune-linux-x64
          path: dist/lune-linux-x64.tar.gz

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        shell: powershell
        run: |
          choco install llvm --version=20.1.8 -y
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build, test, and package (Windows)
        shell: powershell
        run: ./tools/build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: lune-windows-x64
          path: dist/lune-windows-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: lune-linux-x64
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: lune-windows-x64
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lune-linux-x64.tar.gz
            dist/lune-windows-x64.zip
          generate_release_notes: true
